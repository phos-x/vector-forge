apiVersion: v1
kind: ServiceAccount
metadata:
  name: ingestion-service
  namespace: vector-forge
  annotations:
    eks.amazonaws.com/role-arn: ""
---
apiVersion: v1
kind: Service
metadata:
  name: ingestion-service
  namespace: vector-forge
  labels:
    app: ingestion-service
spec:
  type: ClusterIP
  ports:
  - port: 8081
    targetPort: 8081
    protocol: TCP
    name: http
  selector:
    app: ingestion-service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingestion-service
  namespace: vector-forge
  labels:
    app: ingestion-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ingestion-service
  template:
    metadata:
      labels:
        app: ingestion-service
    spec:
      serviceAccountName: ingestion-service
      containers:
      - name: ingestion-service
        image: ingestion-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8081
          name: http
        env:
        - name: AWS_REGION
          value: us-east-1
        - name: DYNAMODB_TABLE
          value: ""
        - name: S3_DOCUMENTS_BUCKET
          value: ""
        - name: S3_VECTORS_BUCKET
          value: ""
        - name: SQS_QUEUE_URL
          value: ""
        - name: CHUNK_SIZE
          value: "512"
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8081
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 5
